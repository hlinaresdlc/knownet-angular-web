<section class="min-h-screen px-6 py-24">

  <div class="mx-auto max-w-7xl">

    <div class="mb-16">

      <p class="mb-4 text-sm font-semibold uppercase tracking-widest text-blue-300">
        Blog
      </p>

      <h1 class="text-4xl font-bold md:text-6xl">
        Ideas, tecnología e innovación.
      </h1>

      <p class="mt-6 max-w-3xl text-lg leading-8 text-slate-300">
        Artículos sobre inteligencia artificial,
        transformación digital,
        integración empresarial,
        RRHH, educación y tecnología.
      </p>

    </div>

    <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-3">

      <article
        *ngFor="let post of posts"
        class="rounded-[2rem] border border-white/10 bg-slate-900/70 p-8 shadow-xl">

        <div class="mb-4 flex items-center gap-3">

          <span class="rounded-full bg-blue-500/20 px-3 py-1 text-xs text-blue-200">
            {{ post.category }}
          </span>

          <span class="text-sm text-slate-400">
            {{ post.date }}
          </span>

        </div>

        <h2 class="text-2xl font-bold">
          {{ post.title }}
        </h2>

        <p class="mt-4 leading-7 text-slate-300">
          {{ post.summary }}
        </p>

        <a
          [routerLink]="['/blog', post.slug]"
          class="mt-8 inline-flex rounded-2xl bg-blue-500 px-5 py-3 font-semibold text-white hover:bg-blue-400">
          Leer artículo
        </a>

      </article>

    </div>

  </div>

</section>
